<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MISCLIPS</title>
  <style>
    body { font-family: Arial; }
    li { cursor: pointer; margin: 5px 0; }
    li:hover { color: blue; }
  </style>
</head>
<body>

  <h1>MISCLIPS 🎥</h1>

  <video id="video" width="600" controls>
    <source src="https://ia801504.us.archive.org/1/items/WCH25wom/videos/WCH%20Final%20phase%20%28Bangkok%29/20250906_wch25_61_1-2_japan_Turkey/JPNvsTUR.mp4" type="video/mp4">
  </video>

  <h2>Clips</h2>
  <ul id="clipList"></ul>

  <script>
    const video = document.getElementById("video");
    const clipList = document.getElementById("clipList");

    let endTime = 0;

    // 👇 Aquí defines tus clips (esto luego vendrá de Excel 👀)
    const clips = [
      { name: "Jugada 1 - Punto Japón", start: 10, end: 20 },
      { name: "Jugada 2 - Bloqueo Turquía", start: 30, end: 40 },
      { name: "Jugada 3 - Rally largo", start: 60, end: 75 }
    ];

    function playClip(start, end) {
      endTime = end;
      video.currentTime = start;
      video.play();
    }

    video.addEventListener("timeupdate", () => {
      if (video.currentTime >= endTime) {
        video.pause();
      }
    });

    // 👇 Generar lista dinámica
    clips.forEach((clip) => {
      const li = document.createElement("li");
      li.textContent = clip.name;

      li.onclick = () => {
        playClip(clip.start, clip.end);
      };

      clipList.appendChild(li);
    });
  </script>

</body>
</html>
